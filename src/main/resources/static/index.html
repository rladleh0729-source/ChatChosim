<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatChosim</title>
    <style>
        :root {
            --bg: #f4f1f9;
            --panel: rgba(255, 255, 255, 0.88);
            --line: #ddd6ea;
            --text: #2a2140;
            --sub: #7d7294;

            --brand: #4a3966;
            --brand-2: #6d5a92;
            --brand-3: #c9bce6;

            --user-text: #ffffff;
            --bot-bg: rgba(255, 255, 255, 0.92);
            --bot-text: #2a2140;

            --shadow-soft: 0 14px 34px rgba(66, 48, 97, 0.08);
            --shadow-panel: 0 24px 60px rgba(70, 50, 104, 0.12);
            --shadow-strong: 0 18px 40px rgba(74, 57, 102, 0.18);

            --focus-ring: rgba(203, 185, 235, 0.30);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
            color: var(--text);
            background:
                    radial-gradient(circle at 18% 14%, rgba(203, 185, 235, 0.48) 0%, rgba(203, 185, 235, 0.18) 18%, transparent 36%),
                    radial-gradient(circle at 82% 18%, rgba(179, 164, 212, 0.34) 0%, rgba(179, 164, 212, 0.14) 16%, transparent 34%),
                    radial-gradient(circle at 72% 78%, rgba(228, 220, 243, 0.70) 0%, rgba(228, 220, 243, 0.24) 18%, transparent 34%),
                    radial-gradient(circle at 28% 88%, rgba(214, 201, 233, 0.46) 0%, rgba(214, 201, 233, 0.18) 20%, transparent 34%),
                    linear-gradient(180deg, #f9f7fc 0%, #f4f1f9 52%, #efebf6 100%);
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                    linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 28%),
                    linear-gradient(215deg, rgba(255, 255, 255, 0.14), transparent 30%);
            mix-blend-mode: screen;
            opacity: 0.7;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                    radial-gradient(circle at 70% 12%, rgba(255, 255, 255, 0.34), transparent 18%),
                    radial-gradient(circle at 22% 28%, rgba(255, 255, 255, 0.22), transparent 20%),
                    radial-gradient(circle at 60% 92%, rgba(255, 255, 255, 0.20), transparent 16%);
            opacity: 0.85;
        }

        .topbar {
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            border-bottom: 1px solid rgba(125, 107, 158, 0.16);
            background:
                    linear-gradient(90deg, rgba(255, 255, 255, 0.74) 0%, rgba(244, 239, 250, 0.84) 46%, rgba(239, 233, 246, 0.88) 100%);
            backdrop-filter: blur(18px);
            box-shadow: 0 8px 26px rgba(74, 57, 102, 0.05);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-size: 16px;
            font-weight: 800;
        }

        .brand-badge {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            background:
                    linear-gradient(135deg, #5f4a84 0%, #8e78ba 48%, #cbb9eb 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            box-shadow:
                    0 10px 22px rgba(95, 74, 132, 0.22),
                    inset 0 1px 1px rgba(255, 255, 255, 0.32);
        }

        .top-link {
            text-decoration: none;
            color: var(--sub);
            font-size: 13px;
            font-weight: 700;
        }

        .main {
            flex: 1;
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 18px 18px 24px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 10px 4px 20px;
            overflow-y: auto;
        }

        .message-row {
            display: flex;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 76%;
            padding: 14px 16px;
            border-radius: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--line);
        }

        .message-row.user .bubble {
            background:
                    linear-gradient(135deg, #564176 0%, #44335f 55%, #3f2b56 100%);
            color: var(--user-text);
            border-color: rgba(80, 61, 111, 0.18);
            box-shadow:
                    0 16px 34px rgba(74, 57, 102, 0.22),
                    inset 0 1px 1px rgba(255, 255, 255, 0.10);
        }

        .message-row.bot .bubble {
            background:
                    linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(250, 247, 252, 0.94) 100%);
            color: var(--bot-text);
            border-color: rgba(211, 202, 228, 0.80);
        }

        .welcome {
            text-align: center;
            padding: 52px 10px 22px;
        }

        .welcome h1 {
            margin: 0;
            font-size: 48px;
            letter-spacing: -0.04em;
            color: #4a3966;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .welcome p {
            margin: 14px 0 0;
            color: var(--sub);
            font-size: 15px;
        }

        .input-wrap {
            position: sticky;
            bottom: 0;
            background:
                    linear-gradient(
                            180deg,
                            rgba(244, 241, 249, 0.00) 0%,
                            rgba(244, 241, 249, 0.42) 18%,
                            rgba(244, 241, 249, 0.76) 42%,
                            rgba(244, 241, 249, 0.96) 100%
                    );
            padding-top: 10px;
        }

        .prompt-box {
            background:
                    linear-gradient(180deg, rgba(255, 255, 255, 0.86) 0%, rgba(250, 247, 252, 0.92) 100%);
            border: 1px solid rgba(214, 205, 230, 0.92);
            border-radius: 28px;
            box-shadow:
                    var(--shadow-panel),
                    inset 0 1px 0 rgba(255, 255, 255, 0.72);
            padding: 14px 14px 12px;
            backdrop-filter: blur(18px);
        }

        .prompt-input {
            width: 100%;
            min-height: 84px;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            color: var(--text);
            font-size: 17px;
            line-height: 1.65;
            padding: 10px 12px 6px;
            font-family: inherit;
        }

        .prompt-input::placeholder {
            color: #aca1bf;
        }

        .prompt-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 8px 2px;
        }

        .tool-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tool-chip {
            border: 1px solid rgba(214, 205, 230, 0.96);
            background:
                    linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(242, 236, 249, 0.92) 100%);
            color: #5a4c73;
            border-radius: 999px;
            padding: 9px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow:
                    0 8px 18px rgba(74, 57, 102, 0.06),
                    inset 0 1px 0 rgba(255, 255, 255, 0.65);
        }

        .tool-chip:hover {
            background:
                    linear-gradient(180deg, rgba(250, 246, 253, 0.98) 0%, rgba(236, 228, 246, 0.96) 100%);
            border-color: rgba(203, 190, 226, 1);
        }

        .send-btn {
            border: none;
            background:
                    linear-gradient(135deg, #5d4a80 0%, #493562 58%, #3f2b56 100%);
            color: white;
            border-radius: 16px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow:
                    0 14px 26px rgba(74, 57, 102, 0.22),
                    inset 0 1px 0 rgba(255, 255, 255, 0.16);
        }

        .send-btn:hover {
            background:
                    linear-gradient(135deg, #6b568f 0%, #554073 58%, #483360 100%);
        }

        .send-btn:focus-visible,
        .tool-chip:focus-visible,
        .top-link:focus-visible,
        .brand:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        @media (max-width: 860px) {
            .welcome h1 {
                font-size: 36px;
            }

            .bubble {
                max-width: 92%;
            }

            .prompt-bottom {
                flex-direction: column;
                align-items: stretch;
            }

            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <a class="brand" href="/">
        <span class="brand-badge">C</span>
        <span>ChatChosim</span>
    </a>
    <a class="top-link" href="/legacy/">QueryBot 아카이브</a>
</header>

<main class="main">
    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcomeBox">
            <h1>무엇을 도와줄까</h1>
            <p>질문을 바로 입력해라.</p>
        </div>
    </div>

    <div class="input-wrap">
        <div class="prompt-box">
            <textarea class="prompt-input" id="promptInput" placeholder="메시지를 입력해라."></textarea>

            <div class="prompt-bottom">
                <div class="tool-row">
                    <button class="tool-chip" type="button" onclick="fillOnly('이 글을 정리해줘.')">글 정리</button>
                    <button class="tool-chip" type="button" onclick="fillOnly('이 수학 문제를 풀이해줘.')">수학 풀이</button>
                    <button class="tool-chip" type="button" onclick="fillOnly('파이썬 오류를 분석해줘.')">파이썬</button>
                    <button class="tool-chip" type="button" onclick="fillOnly('이 아이디어를 발전시켜줘.')">아이디어</button>
                </div>
                <button class="send-btn" type="button" onclick="sendMessage()">보내기</button>
            </div>
        </div>
    </div>
</main>

<script>
    const chatArea = document.getElementById("chatArea");
    const promptInput = document.getElementById("promptInput");
    const welcomeBox = document.getElementById("welcomeBox");

    function fillOnly(text) {
        promptInput.value = text;
        promptInput.focus();
    }

    function addMessage(role, text) {
        if (welcomeBox) {
            welcomeBox.style.display = "none";
        }

        const row = document.createElement("div");
        row.className = "message-row " + role;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        row.appendChild(bubble);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function sendMessage() {
        const text = promptInput.value.trim();

        if (!text) {
            promptInput.focus();
            return;
        }

        addMessage("user", text);
        promptInput.value = "";

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: text })
            });

            if (!response.ok) {
                throw new Error("서버 응답 오류");
            }

            const data = await response.json();
            addMessage("bot", data.reply || "응답이 비어 있다.");
        } catch (error) {
            addMessage("bot", "메시지 처리 중 오류가 발생했다.");
            console.error(error);
        }
    }

    promptInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
