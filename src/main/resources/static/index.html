<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatChosim</title>
    <style>
        :root {
            --bg: #f6f4fa;
            --panel: rgba(255, 255, 255, 0.92);
            --line: #e7e0ef;
            --text: #2a2140;
            --sub: #766b8e;
            --brand: #3f2b56;
            --user-bg: linear-gradient(135deg, #4b3768 0%, #3f2b56 100%);
            --user-text: #ffffff;
            --bot-bg: #ffffff;
            --bot-text: #2a2140;
            --shadow: 0 18px 44px rgba(63, 43, 86, 0.10);
            --soft-bg: #f8f5fc;
            --soft-line: #ddd4e8;
            --focus-ring: rgba(203, 185, 235, 0.22);
            --badge-grad: linear-gradient(135deg, #5a4380 0%, #cbb9eb 100%);
            --topbar-bg: rgba(246, 244, 250, 0.82);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
            background:
                    radial-gradient(circle at 12% 12%, rgba(203, 185, 235, 0.22), transparent 30%),
                    radial-gradient(circle at 88% 16%, rgba(216, 196, 206, 0.18), transparent 28%),
                    radial-gradient(circle at 50% 100%, rgba(160, 145, 190, 0.10), transparent 34%),
                    linear-gradient(180deg, #fbfafe 0%, #f6f4fa 56%, #f2eef7 100%);
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            border-bottom: 1px solid var(--line);
            background:
                    linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.58)),
                    var(--topbar-bg);
            backdrop-filter: blur(14px);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-size: 16px;
            font-weight: 800;
        }

        .brand-badge {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            background: var(--badge-grad);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(91, 74, 122, 0.22);
        }

        .top-link {
            text-decoration: none;
            color: var(--sub);
            font-size: 13px;
            font-weight: 700;
        }

        .main {
            flex: 1;
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 18px 18px 24px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 10px 4px 20px;
            overflow-y: auto;
        }

        .message-row {
            display: flex;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 76%;
            padding: 14px 16px;
            border-radius: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
        }

        .message-row.user .bubble {
            background: var(--user-bg);
            color: var(--user-text);
            border-color: transparent;
        }

        .message-row.bot .bubble {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(249, 246, 252, 0.96));
            color: var(--bot-text);
        }

        .welcome {
            text-align: center;
            padding: 52px 10px 22px;
        }

        .welcome h1 {
            margin: 0;
            font-size: 48px;
            letter-spacing: -0.04em;
            color: #3f2b56;
        }

        .welcome p {
            margin: 14px 0 0;
            color: var(--sub);
            font-size: 15px;
        }

        .input-wrap {
            position: sticky;
            bottom: 0;
            background:
                    linear-gradient(180deg, rgba(246, 244, 250, 0) 0%, rgba(246, 244, 250, 0.82) 24%, rgba(246, 244, 250, 0.96) 100%);
            padding-top: 10px;
        }

        .prompt-box {
            background: var(--panel);
            border: 1px solid var(--soft-line);
            border-radius: 28px;
            box-shadow: 0 22px 54px rgba(63, 43, 86, 0.12);
            padding: 14px 14px 12px;
            backdrop-filter: blur(16px);
        }

        .prompt-input {
            width: 100%;
            min-height: 84px;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            color: var(--text);
            font-size: 17px;
            line-height: 1.65;
            padding: 10px 12px 6px;
            font-family: inherit;
        }

        .prompt-input::placeholder {
            color: #9a90ae;
        }

        .prompt-input:focus {
            box-shadow: inset 0 0 0 9999px transparent;
        }

        .prompt-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 6px 8px 2px;
        }

        .tool-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tool-chip {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, #fcfbfe 0%, #f4eff9 100%);
            color: #4d4262;
            border-radius: 999px;
            padding: 9px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(63, 43, 86, 0.05);
        }

        .tool-chip:hover {
            background: linear-gradient(180deg, #f7f2fb 0%, #eee7f6 100%);
            border-color: #d7cae6;
        }

        .send-btn {
            border: none;
            background: linear-gradient(135deg, #4b3768 0%, #3f2b56 100%);
            color: white;
            border-radius: 16px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(63, 43, 86, 0.20);
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #5a4380 0%, #493562 100%);
        }

        .send-btn:focus-visible,
        .tool-chip:focus-visible,
        .top-link:focus-visible,
        .brand:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        @media (max-width: 860px) {
            .welcome h1 {
                font-size: 36px;
            }

            .bubble {
                max-width: 92%;
            }

            .prompt-bottom {
                flex-direction: column;
                align-items: stretch;
            }

            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <a class="brand" href="/">
        <span class="brand-badge">C</span>
        <span>ChatChosim</span>
    </a>
    <a class="top-link" href="/legacy/">QueryBot 아카이브</a>
</header>

<main class="main">
    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcomeBox">
            <h1>무엇을 도와줄까</h1>
            <p>질문을 바로 입력해라.</p>
        </div>
    </div>

    <div class="input-wrap">
        <div class="prompt-box">
            <textarea class="prompt-input" id="promptInput" placeholder="메시지를 입력해라."></textarea>

            <div class="prompt-bottom">
                <div class="tool-row">
                    <button class="tool-chip" type="button" onclick="fillOnly('이 글을 정리해줘.')">글 정리</button>
                    <button class="tool-chip" type="button" onclick="fillOnly('이 수학 문제를 풀이해줘.')">수학 풀이</button>
                    <button class="tool-chip" type="button" onclick="fillOnly('파이썬 오류를 분석해줘.')">파이썬</button>
                    <button class="tool-chip" type="button" onclick="fillOnly('이 아이디어를 발전시켜줘.')">아이디어</button>
                </div>
                <button class="send-btn" type="button" onclick="sendMessage()">보내기</button>
            </div>
        </div>
    </div>
</main>

<script>
    const chatArea = document.getElementById("chatArea");
    const promptInput = document.getElementById("promptInput");
    const welcomeBox = document.getElementById("welcomeBox");

    function fillOnly(text) {
        promptInput.value = text;
        promptInput.focus();
    }

    function addMessage(role, text) {
        if (welcomeBox) {
            welcomeBox.style.display = "none";
        }

        const row = document.createElement("div");
        row.className = "message-row " + role;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        row.appendChild(bubble);
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function sendMessage() {
        const text = promptInput.value.trim();

        if (!text) {
            promptInput.focus();
            return;
        }

        addMessage("user", text);
        promptInput.value = "";

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: text })
            });

            if (!response.ok) {
                throw new Error("서버 응답 오류");
            }

            const data = await response.json();
            addMessage("bot", data.reply || "응답이 비어 있다.");
        } catch (error) {
            addMessage("bot", "메시지 처리 중 오류가 발생했다.");
            console.error(error);
        }
    }

    promptInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
